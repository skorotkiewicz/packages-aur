name: Update and Publish min-bin to AUR

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    container:
      image: archlinux:base-devel
    outputs:
      changed: ${{ steps.versions.outputs.changed }}
      latest: ${{ steps.versions.outputs.latest }}

    steps:
      - name: Install dependencies and create builder user
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm git openssh jq curl pacman-contrib sudo gtk3 nss libxss
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set ownership for builder user
        run: chown -R builder:builder "$GITHUB_WORKSPACE"

      - name: Configure Git for builder user
        run: |
          sudo -u builder -E HOME=/home/builder git config --global user.name "github-actions[bot]"
          sudo -u builder -E HOME=/home/builder git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Get current and latest versions
        id: versions
        run: |
          current_ver=$(grep -oP '^pkgver=\K.*' minbrowser/PKGBUILD)
          latest_ver=$(curl -fsSL https://api.github.com/repos/minbrowser/min/releases/latest | jq -r '.tag_name' | sed 's/^v//')
          changed=false
          if [ "$current_ver" != "$latest_ver" ]; then
            changed=true
          fi
          echo "current=$current_ver" >> "$GITHUB_OUTPUT"
          echo "latest=$latest_ver" >> "$GITHUB_OUTPUT"
          echo "changed=$changed" >> "$GITHUB_OUTPUT"
          echo "Current version: $current_ver"
          echo "Latest version: $latest_ver"

      - name: Update PKGBUILD and checksums
        if: steps.versions.outputs.changed == 'true'
        run: |
          latest_ver="${{ steps.versions.outputs.latest }}"
          sed -i "s/^pkgver=.*/pkgver=$latest_ver/" minbrowser/PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" minbrowser/PKGBUILD
          sudo -u builder -E HOME=/home/builder bash -lc 'cd minbrowser && updpkgsums && makepkg --printsrcinfo > .SRCINFO'

      - name: Build package
        if: steps.versions.outputs.changed == 'true'
        run: sudo -u builder -E HOME=/home/builder bash -lc 'cd minbrowser && makepkg -f'

      - name: Push updated packaging to GitHub
        if: steps.versions.outputs.changed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          sudo -u builder -E HOME=/home/builder git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          sudo -u builder -E HOME=/home/builder git add minbrowser/PKGBUILD minbrowser/.SRCINFO
          sudo -u builder -E HOME=/home/builder git commit -m "update: ${{ steps.versions.outputs.latest }}" || true
          sudo -u builder -E HOME=/home/builder git push origin main

      - name: Summary
        run: |
          if [ "${{ steps.versions.outputs.changed }}" = "true" ]; then
            echo "Built and pushed version ${{ steps.versions.outputs.latest }} to GitHub."
          else
            echo "No new version available. Current: ${{ steps.versions.outputs.current }}"
          fi

  aur-publish:
    needs: check-and-build
    if: needs.check-and-build.outputs.changed == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Publish AUR package
        uses: KSXGitHub/github-actions-deploy-aur@v4.1.2
        with:
          pkgname: min-bin
          pkgbuild: ./minbrowser/PKGBUILD
          assets: |
            minbrowser/.SRCINFO
          commit_username: ${{ secrets.AUR_USERNAME }}
          commit_email: ${{ secrets.AUR_EMAIL }}
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "aur: ${{ needs.check-and-build.outputs.latest }}"
          ssh_keyscan_types: rsa,ecdsa,ed25519
